services:
  db:
    image: "postgres:17"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ".docker/db/postgres.conf:/etc/postgresql/postgres.conf:ro"
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    command: "-c config_file=/etc/postgresql/postgres.conf"

  web:
    build: .docker/web
    volumes:
      - ".:/code"
      # Shadow the bind-mounted .venv with an anonymous volume so a virtualenv
      # created on the host (different interpreter/paths) never leaks into the
      # container. The container uses UV_PROJECT_ENVIRONMENT=/usr/local instead.
      - "/code/.venv"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db

volumes:
  postgres-data:
